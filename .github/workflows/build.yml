name: Build RAJ VIDEO MERGE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name RAJ_VIDEO_MERGE main.py

      - name: Download ffmpeg (static build)
        run: |
          curl -L -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          powershell -Command "Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extracted"
          $ffdir = Get-ChildItem -Path ffmpeg_extracted -Directory | Select-Object -First 1
          Copy-Item "$($ffdir.FullName)\bin\ffmpeg.exe" dist\ffmpeg.exe
          Copy-Item "$($ffdir.FullName)\bin\ffprobe.exe" dist\ffprobe.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RAJ_VIDEO_MERGE
          path: dist/
